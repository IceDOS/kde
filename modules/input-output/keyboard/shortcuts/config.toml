# Rebind Plasma / KWin / global shortcuts. Shape: group -> action -> key.
# Value is a string, a list of strings (multiple bindings), or [] to unbind.
# Flows verbatim to programs.plasma.shortcuts. Example:
#   [icedos.desktop.kde.shortcuts.bindings.kwin]
#   "Overview" = "Meta+W"
#   "Window Maximize" = ["Meta+Up", "Meta+PgUp"]
[icedos.desktop.kde.shortcuts.bindings]

# Custom command hotkeys: each entry runs a shell command on keypress.
# Shape: name -> { command, key = "..." (or keys = [...]), comment = "..." }.
# Flows to programs.plasma.hotkeys.commands. Example:
#   [icedos.desktop.kde.shortcuts.hotkeys.launch-terminal]
#   command = "konsole"
#   key = "Meta+Return"
[icedos.desktop.kde.shortcuts.hotkeys]
