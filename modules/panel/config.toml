[icedos.desktop.kde.panel]
autohide = false
floating = false
height = 32
location = "top" # top, bottom, left, right, floating
opacity = "opaque" # adaptive, opaque, translucent
screen = "all" # "all", or a 0-based monitor index

# Ordered list of applet IDs placed left-to-right on the panel. Per-applet
# settings live in their own modules under panel/applets/ (merged in by ID);
# IDs without a settings module render with plasma defaults.
widgets = [
  "org.kde.plasma.kickoff",
  "org.kde.plasma.panelspacer",
  "org.kde.plasma.icontasks",
  "org.kde.plasma.panelspacer",
  "org.kde.plasma.marginsseparator",
  "org.kde.plasma.systemtray",
  "org.kde.plasma.digitalclock",
]
